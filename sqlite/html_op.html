<?php
// (conexão igual ao bloco acima)
$clientes = $pdo->query(
    "SELECT id, nome, email FROM clientes WHERE ativo = 1 ORDER BY nome"
)->fetchAll(PDO::FETCH_ASSOC);
?>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        table { border-collapse: collapse; width: 100%; }

    </style>
</head>
<body>

<table>

        <tr><th>ID</th><th>Nome</th><th>E-mail</th></tr>
